name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          package_init = Path("src/ccs/__init__.py").read_text()
          version_match = re.search(r'^__version__\s*=\s*"([^"]+)"', package_init, re.MULTILINE)
          if version_match is None:
              raise SystemExit("Could not find __version__ in src/ccs/__init__.py")

          version = version_match.group(1)
          release_tag = os.environ["RELEASE_TAG"]
          expected_tag = f"v{version}"
          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag {release_tag} does not match package version {version} "
                  f"(expected {expected_tag})"
              )

          print(f"Release tag {release_tag} matches package version {version}")
          PY

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          retention-days: 30

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    environment: pypi

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    runs-on: ubuntu-latest
    needs: [publish]

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
