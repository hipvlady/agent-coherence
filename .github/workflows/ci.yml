name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test-and-hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run architecture boundary + cycle checks
        run: python tools/check_architecture.py
      - name: Run test suite
        run: pytest -q
      - name: Run benchmark regression smoke
        run: python tools/benchmark_regression_smoke.py
