# Canonical scenario matching §8 Definition 3 parameters.
# n=4 agents, S=40 ticks, artifact=4096 tokens, V=0.05 (low volatility).
# Write probability (~0.05) approximates W≈2 expected writes over 40 ticks.
simulation:
  duration_ticks: 40
  num_agents: 4
  seed: 20260305
  action_probability: 0.75
network:
  latency_ticks: 1
  message_loss_rate: 0.0
scenario:
  name: planning-canonical
  workload: custom
  action_probability: 0.75
  write_probability: 0.05
artifacts:
  - id: plan.md
    size_tokens: 4096
    volatility: 0.05
    initial_version: 1
    mutable: true
strategies:
  eager: {}
  lazy:
    check_interval_ticks: 2
  lease:
    default_ttl_ticks: 10
  access_count:
    max_accesses: 6
transient:
  timeout_ticks: 5
context_semantics:
  model: conditional_injection
